databases:
  - name: wto3-db
    plan: free

services:
  # السيرفر (Socket.io Backend)
  - type: web
    name: wto3-server
    env: node
    plan: free
    buildCommand: npm install -g pnpm && pnpm install && pnpm --filter database db:generate && pnpm --filter database db:push && pnpm --filter server build
    startCommand: pnpm --filter server start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: wto3-db
          property: connectionString

  # الواجهة (Next.js Frontend)
  - type: web
    name: wto3
    env: node
    plan: free
    buildCommand: npm install -g pnpm && pnpm install && pnpm --filter database db:generate && pnpm --filter web build
    startCommand: pnpm --filter web start
    envVars:
      - key: NEXT_PUBLIC_SERVER_URL
        fromService:
          type: web
          name: wto3-server
          envVarKey: RENDER_EXTERNAL_URL
      - key: DATABASE_URL
        fromDatabase:
          name: wto3-db
          property: connectionString
      - key: NEXTAUTH_URL
        fromService:
          type: web
          name: wto3
          envVarKey: RENDER_EXTERNAL_URL
      # المتغيرات السرية
      - key: NEXT_PUBLIC_YOUTUBE_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
