[phases.setup]
nixPkgs = ["nodejs_20", "openssl"]

[phases.install]
cmds = ["npm install -g pnpm@9 && pnpm install --frozen-lockfile && pnpm --filter database db:generate"]

[phases.build]
cmds = ["pnpm --filter server build"]

[start]
cmd = "cd packages/database && npx prisma migrate deploy && cd / && pnpm --filter server start"